  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n {num:'05',tag:'GOVERNANÇA',cor:'#3b86e6',titulo:'Registrar decisões com dono e prazo',texto:'Registrar cada decisão com responsável e prazo e cobrar o status na próxima revisão executiva.',frentes:['Todas as frentes']}\n];\nfunction civ4(){\n  return '<section class=\"slide\" style=\"'+slideShell('42px 54px 30px')+'\">'\n    + header('#e0563f,#e0a92a','04 · Plano de Decisão','#c98a72','PRIORIDADES & DECISÕES — PRÓXIMOS 15 DIAS','Encerramento executivo · decisões com dono e prazo para custo, prazo, escopo e margem','Base 15.06.26')\n    + priorCards(CIV_PRIOR)\n    + summaryStrip(\n        [{v:'37,28%',l:'Margem bruta prevista',color:'#2bb06f'},{v:'R$ 331K',l:'Impostos',color:'#e0a92a'},{v:'R$ 1,19M',l:'Lucro previsto',color:'#fff',lc:'#bcd3ee'}],\n        'Carteira de <strong style=\"color:#fff\">4 obras civis<\u002Fstrong> sob gestão ativa de custos, prazos e margem. Faturamento de <strong style=\"color:#fff\">R$ 3,12M<\u002Fstrong>, margem bruta prevista de <strong style=\"color:#7fd3a6\">37,28%<\u002Fstrong> e lucro previsto de <strong style=\"color:#7fd3a6\">R$ 1,19M<\u002Fstrong> após impostos.')\n    + foot('Relatório de decisão executiva · dados reais (ERP + sistema de pagamento + cronograma) · AZ-TECH · Junho 2026','Painel de Gestão à Vista · Obras Civis')\n  + '<\u002Fsection>';\n}\n\n/* ═══════════════════ CAPA ═══════════════════ */\nfunction cover(){\n  function pcard(cor,nome,obras,fat,lucro){\n    return '<div style=\"flex:1;display:flex;flex-direction:column;gap:14px;background:linear-gradient(#15202c,#101a24);border:1px solid #233040;border-top:3px solid '+cor+';border-radius:16px;padding:30px 28px\">'\n      + '<div style=\"font-family:\\'Barlow Semi Condensed\\',sans-serif;font-weight:700;font-size:30px;letter-spacing:1px;color:#fff\">'+nome+'<\u002Fdiv>'\n      + '<div style=\"display:flex;gap:30px;margin-top:6px\">'\n        + '<div><div style=\"font-family:\\'Barlow Semi Condensed\\',sans-serif;font-weight:700;font-size:40px;color:'+cor+'\">'+obras+'<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8;text-transform:uppercase;letter-spacing:1px\">obras<\u002Fdiv><\u002Fdiv>'\n        + '<div><div style=\"font-family:\\'Barlow Semi Condensed\\',sans-serif;font-weight:700;font-size:40px;color:#fff\">'+fat+'<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8;text-transform:uppercase;letter-spacing:1px\">faturamento<\u002Fdiv><\u002Fdiv>'\n        + '<div><div style=\"font-family:\\'Barlow Semi Condensed\\',sans-serif;font-weight:700;font-size:40px;color:#7fd3a6\">'+lucro+'<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8;text-transform:uppercase;letter-spacing:1px\">lucro prev.<\u002Fdiv><\u002Fdiv>'\n      + '<\u002Fdiv>'\n    + '<\u002Fdiv>';\n  }\n  return '<section class=\"slide\" style=\"'+slideShell('70px 64px 50px')+'\">'\n    + '<div style=\"display:flex;justify-content:space-between;align-items:flex-start\">'\n      + '<div style=\"display:flex;gap:20px;align-items:stretch\"><div style=\"width:7px;border-radius:4px;background:linear-gradient(#3b86e6,#2f6fd0)\"><\u002Fdiv><div><div style=\"font-size:15px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#6c8aa6\">Gerência de Engenharia<\u002Fdiv><div style=\"font-family:\\'Barlow Semi Condensed\\',sans-serif;font-weight:700;font-size:74px;line-height:.95;color:#fff;margin-top:8px\">PAINEL DE GESTÃO À VISTA<\u002Fdiv><div style=\"font-size:20px;color:#8a99ab;margin-top:10px\">Tubulações · Pinturas · Obras Civis — acompanhamento executivo de custos, prazos e margem<\u002Fdiv><\u002Fdiv><\u002Fdiv>'\n      + '<div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:10px\"><div style=\"font-family:\\'Barlow Semi Condensed\\',sans-serif;font-weight:700;font-size:42px;letter-spacing:3px;color:#fff\">AZ-TECH<\u002Fdiv><div style=\"display:flex;align-items:center;gap:9px;background:#13202c;border:1px solid #243646;border-radius:8px;padding:7px 14px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#2bb06f;animation:liveDot 2s ease-in-out infinite\"><\u002Fspan><span style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:14px;color:#aebccd\">AO VIVO <span class=\"clk\">--:--<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>'\n    + '<\u002Fdiv>'\n    + '<div style=\"flex:1;display:flex;gap:22px;align-items:center;margin-top:30px\">'+pcard('#3b86e6','TUBULAÇÕES','7','R$ 11,89M','R$ 3,42M')+pcard('#2bb06f','PINTURAS','6','R$ 4,08M','R$ 1,08M')+pcard('#e0a92a','OBRAS CIVIS','4','R$ 3,12M','R$ 1,19M')+'<\u002Fdiv>'\n    + '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:24px;font-size:15px;color:#566778\"><div>17 obras sob gestão ativa · faturamento consolidado de <strong style=\"color:#9fb0c2\">R$ 19,09M<\u002Fstrong><\u002Fdiv><div>AZ-TECH · Gerência de Engenharia · Junho 2026<\u002Fdiv><\u002Fdiv>'\n  + '<\u002Fsection>';\n}\n\n/* ═══════════════════ ESTRUTURA DOS PAINÉIS ═══════════════════ */\nvar PANELS = {\n  tub:{ key:'tub', nome:'TUBULAÇÕES', telas:[tub1,tub2,tub3,tub4] },\n  pin:{ key:'pin', nome:'PINTURAS',   telas:[pin1,pin2,pin3,pin4] },\n  civ:{ key:'civ', nome:'OBRAS CIVIS',telas:[civ1,civ2,civ3,civ4] }\n};\n\n/* ═══════════════════ ENGINE ═══════════════════ */\nvar cfg = loadCfg();\nvar canvas = document.getElementById('canvas');\nvar slides = [];   // {el, panelKey, screenIdx, panelName, screenCount}\nvar idx = 0, timer = null, rafId = null, startTs = 0, playing = false;\n\nfunction loadCfg(){\n  var d = { segundosPorTela:CONFIG.segundosPorTela, autoPlay:CONFIG.autoPlay, piscarCriticas:CONFIG.piscarCriticas };\n  try{ var s=JSON.parse(localStorage.getItem('painelAZ.cfg')||'{}'); if(typeof s.segundosPorTela==='number')d.segundosPorTela=s.segundosPorTela; if(typeof s.autoPlay==='boolean')d.autoPlay=s.autoPlay; if(typeof s.piscarCriticas==='boolean')d.piscarCriticas=s.piscarCriticas; }catch(e){}\n  return d;\n}\nfunction saveCfg(){ try{ localStorage.setItem('painelAZ.cfg', JSON.stringify(cfg)); }catch(e){} }\n\nfunction build(){\n  var html = cover();\n  var meta = [{panelKey:'',screenIdx:0,panelName:'',screenCount:0,cover:true}];\n  CONFIG.ordemPaineis.forEach(function(k){\n    var p = PANELS[k]; if(!p) return;\n    p.telas.forEach(function(fn,i){ html += fn(); meta.push({panelKey:k,screenIdx:i,panelName:p.nome,screenCount:p.telas.length,cover:false}); });\n  });\n  canvas.innerHTML = html;\n  var els = canvas.querySelectorAll('.slide');\n  slides = [];\n  for(var i=0;i<els.length;i++){ slides.push(Object.assign({el:els[i]}, meta[i])); }\n  buildTabs();\n}\nfunction buildTabs(){\n  var tabs = document.getElementById('tabs'); tabs.innerHTML='';\n  CONFIG.ordemPaineis.forEach(function(k){\n    var p=PANELS[k]; var b=document.createElement('button'); b.className='tab'; b.dataset.key=k;\n    var dots=''; for(var i=0;i<p.telas.length;i++) dots+='<i><\u002Fi>';\n    b.innerHTML = p.nome+'<div class=\"dots\">'+dots+'<\u002Fdiv>';\n    b.onclick=function(){ var key=this.dataset.key; for(var j=0;j<slides.length;j++){ if(slides[j].panelKey===key){ go(j); break; } } };\n    tabs.appendChild(b);\n  });\n}\nfunction fit(){\n  var s = Math.min(window.innerWidth/1920, window.innerHeight/1080);\n  canvas.style.transform = 'scale('+s+')';\n}\nfunction show(i){\n  slides.forEach(function(s,j){ if(j===i) s.el.classList.add('active'); else s.el.classList.remove('active'); });\n  idx=i; updateChrome();\n}\nfunction go(i){ if(!slides.length) return; i=(i%slides.length+slides.length)%slides.length; show(i); restartTimer(); }\nfunction next(){ go(idx+1); }\nfunction prev(){ go(idx-1); }\nfunction nextPanel(dir){\n  // pula para a primeira tela do próximo/anterior painel\n  var order = ['cover'].concat(CONFIG.ordemPaineis);\n  var curKey = slides[idx].cover ? 'cover' : slides[idx].panelKey;\n  var ci = order.indexOf(curKey);\n  var nk = order[(ci+dir+order.length)%order.length];\n  if(nk==='cover'){ go(0); return; }\n  for(var j=0;j<slides.length;j++){ if(slides[j].panelKey===nk){ go(j); return; } }\n}\n\nfunction updateChrome(){\n  var s=slides[idx];\n  var cstat=document.getElementById('cstat');\n  if(s.cover){ cstat.innerHTML='<b>Capa<\u002Fb><br>Painel de Gestão à Vista'; }\n  else { cstat.innerHTML='<b>'+s.panelName+'<\u002Fb><br>Tela '+(s.screenIdx+1)+' / '+s.screenCount; }\n  var tabs=document.querySelectorAll('.tab');\n  tabs.forEach(function(t){\n    var on = !s.cover && t.dataset.key===s.panelKey;\n    t.classList.toggle('on',on);\n    var dots=t.querySelectorAll('.dots i');\n    dots.forEach(function(d,di){ d.className=''; if(on){ if(di===s.screenIdx)d.classList.add('cur'); else if(di<s.screenIdx)d.classList.add('done'); } });\n  });\n}\n\n/* rotação + barra de progresso */\nfunction restartTimer(){\n  if(timer){ clearTimeout(timer); timer=null; }\n  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }\n  var prog=document.getElementById('progress');\n  if(!cfg.autoPlay){ playing=false; prog.style.width='0'; prog.classList.add('hidden'); updatePlayBtn(); return; }\n  playing=true; prog.classList.remove('hidden'); updatePlayBtn();\n  startTs=performance.now();\n  var dur=cfg.segundosPorTela*1000;\n  function frame(now){\n    var el=now-startTs; var pct=Math.min(el/dur,1);\n    prog.style.width=(pct*100)+'%';\n    if(pct>=1){ next(); return; }\n    rafId=requestAnimationFrame(frame);\n  }\n  rafId=requestAnimationFrame(frame);\n}\nfunction togglePlay(){ cfg.autoPlay=!cfg.autoPlay; saveCfg(); syncToggles(); restartTimer(); }\nfunction updatePlayBtn(){\n  var b=document.getElementById('play');\n  b.innerHTML = playing\n    ? '<svg viewBox=\"0 0 16 16\" fill=\"currentColor\"><rect x=\"3.5\" y=\"2.5\" width=\"3.2\" height=\"11\" rx=\"1\"/><rect x=\"9.3\" y=\"2.5\" width=\"3.2\" height=\"11\" rx=\"1\"/><\u002Fsvg>'\n    : '<svg viewBox=\"0 0 16 16\" fill=\"currentColor\"><path d=\"M4 2.6v10.8a.6.6 0 0 0 .92.5l8.2-5.4a.6.6 0 0 0 0-1L4.92 2.1A.6.6 0 0 0 4 2.6z\"/><\u002Fsvg>';\n  b.title = playing ? 'Pausar (OK)' : 'Continuar (OK)';\n}\n\n/* relógio AO VIVO */\nfunction tickClock(){\n  var t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});\n  var els=document.getElementsByClassName('clk'); for(var i=0;i<els.length;i++) els[i].textContent=t;\n}\n\n/* ── controles que auto-ocultam ── */\nvar chrome=document.getElementById('chrome'), hideT=null;\nfunction poke(){ chrome.classList.remove('hidden'); if(hideT)clearTimeout(hideT); hideT=setTimeout(function(){ if(!document.getElementById('cfg').classList.contains('open')) chrome.classList.add('hidden'); },3500); }\nwindow.addEventListener('mousemove',poke);\n\n/* ── teclado / controle remoto ── */\ndocument.addEventListener('keydown',function(e){\n  var cfgOpen=document.getElementById('cfg').classList.contains('open');\n  if(cfgOpen){ if(e.key==='Escape'||e.key==='Enter'){ closeCfg(); e.preventDefault(); } return; }\n  poke();\n  switch(e.key){\n    case 'ArrowRight': case 'PageDown': next(); e.preventDefault(); break;\n    case 'ArrowLeft': case 'PageUp': prev(); e.preventDefault(); break;\n    case 'ArrowDown': nextPanel(1); e.preventDefault(); break;\n    case 'ArrowUp': nextPanel(-1); e.preventDefault(); break;\n    case 'Enter': case ' ': case 'Spacebar': togglePlay(); e.preventDefault(); break;\n    case 'Home': go(0); e.preventDefault(); break;\n    case 'c': case 'C': openCfg(); e.preventDefault(); break;\n    case '1': nextPanelByNum(0); e.preventDefault(); break;\n    case '2': nextPanelByNum(1); e.preventDefault(); break;\n    case '3': nextPanelByNum(2); e.preventDefault(); break;\n    case '0': go(0); e.preventDefault(); break;\n  }\n});\nfunction nextPanelByNum(n){ var k=CONFIG.ordemPaineis[n]; if(!k)return; for(var j=0;j<slides.length;j++){ if(slides[j].panelKey===k){ go(j); return; } } }\n\n/* botões clicáveis (Magic Remote / mouse) */\ndocument.getElementById('prev').onclick=function(){ prev(); poke(); };\ndocument.getElementById('next').onclick=function(){ next(); poke(); };\ndocument.getElementById('play').onclick=function(){ togglePlay(); poke(); };\ndocument.getElementById('gear').onclick=function(){ openCfg(); };\n\n/* ── modal de config ── */\nfunction openCfg(){ document.getElementById('cfg').classList.add('open'); chrome.classList.remove('hidden'); syncToggles(); }\nfunction closeCfg(){ document.getElementById('cfg').classList.remove('open'); restartTimer(); poke(); }\nfunction syncToggles(){\n  document.getElementById('secNum').textContent=cfg.segundosPorTela;\n  document.getElementById('secRange').value=cfg.segundosPorTela;\n  document.getElementById('tgAuto').classList.toggle('on',cfg.autoPlay);\n  document.getElementById('tgPulse').classList.toggle('on',cfg.piscarCriticas);\n  document.body.classList.toggle('pulse',cfg.piscarCriticas);\n  updatePlayBtn();\n}\nfunction setSecs(v){ v=Math.max(5,Math.min(60,v)); cfg.segundosPorTela=v; saveCfg(); syncToggles(); if(!document.getElementById('cfg').classList.contains('open')) restartTimer(); }\ndocument.getElementById('secMinus').onclick=function(){ setSecs(cfg.segundosPorTela-1); };\ndocument.getElementById('secPlus').onclick=function(){ setSecs(cfg.segundosPorTela+1); };\ndocument.getElementById('secRange').oninput=function(){ setSecs(parseInt(this.value,10)); };\ndocument.getElementById('tgAuto').onclick=function(){ cfg.autoPlay=!cfg.autoPlay; saveCfg(); syncToggles(); restartTimer(); };\ndocument.getElementById('tgPulse').onclick=function(){ cfg.piscarCriticas=!cfg.piscarCriticas; saveCfg(); syncToggles(); };\ndocument.getElementById('cfgx').onclick=closeCfg;\ndocument.getElementById('cfgok').onclick=closeCfg;\ndocument.getElementById('cfg').onclick=function(e){ if(e.target===this) closeCfg(); };\n\n/* ── boot ── */\nwindow.addEventListener('resize',fit);\nbuild();\nfit();\ndocument.body.classList.toggle('pulse',cfg.piscarCriticas);\ntickClock(); setInterval(tickClock,20000);\nshow(0);\nrestartTimer();\npoke();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
